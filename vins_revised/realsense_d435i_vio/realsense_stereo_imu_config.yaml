%YAML:1.0

# ================================================================
# VINS-Fusion 双目 VIO 配置文件 —— RealSense D435i @ 640×480
# ================================================================
# 坐标系说明（非常重要！）
# ---------------------------------------------------------------
# Camera (infra):  X-right,  Y-down,  Z-forward  (OpenCV 惯例)
# IMU   (BMI085):  X-forward, Y-left,   Z-up      (ROS 惯例)
#
# 两者坐标轴方向不同，body_T_cam0/body_T_cam1 的旋转矩阵
# 负责把相机坐标系转换到 IMU 坐标系，不能简化为单位阵！
# ================================================================

#common parameters
imu: 1
num_of_cam: 2

# ---------------------------------------------------------------
# 话题名（与源码编译的 realsense-ros 发布的话题一致）
# ---------------------------------------------------------------
imu_topic: "/camera/camera/imu"
image0_topic: "/camera/camera/infra1/image_rect_raw"
image1_topic: "/camera/camera/infra2/image_rect_raw"
output_path: "/home/lyx/output/"

cam0_calib: "left.yaml"
cam1_calib: "right.yaml"
image_width: 640
image_height: 480

# ---------------------------------------------------------------
# Extrinsic parameter between IMU and Camera.
# ---------------------------------------------------------------
# 0 = 外参完全信任，不做优化
# 1 = 用下面给出的初值，VIO 初始化时在线优化（推荐）
# ---------------------------------------------------------------
estimate_extrinsic: 1

# ================================================================
# 📌 body_T_cam0  (IMU → 左目相机)
# ================================================================
# 数据来源：RealSense 出厂标定 /camera/camera/extrinsics/depth_to_accel
#   rotation: I (IMU 与相机坐标轴方向基本一致)
#   translation: [-0.00552, 0.00510, 0.01174] m
# ================================================================
body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ 1.0000000000000000e+00, 0.0000000000000000e+00, 0.0000000000000000e+00, -5.5200001224875450e-03, 0.0000000000000000e+00, 1.0000000000000000e+00, 0.0000000000000000e+00, 5.1000001840293407e-03, 0.0000000000000000e+00, 0.0000000000000000e+00, 1.0000000000000000e+00, 1.1739999987185001e-02, 0., 0., 0., 1. ]

# ================================================================
# 📌 body_T_cam1  (IMU → 右目相机)
# ================================================================
# 数据来源：body_T_cam0 + depth_to_infra2 基线
#   baseline = [-0.05015, 0, 0] m
# ================================================================
body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ 1.0000000000000000e+00, 0.0000000000000000e+00, 0.0000000000000000e+00, 4.4626050628721714e-02, 0.0000000000000000e+00, 1.0000000000000000e+00, 0.0000000000000000e+00, 5.1000001840293407e-03, 0.0000000000000000e+00, 0.0000000000000000e+00, 1.0000000000000000e+00, 1.1739999987185001e-02, 0., 0., 0., 1. ]

# ================================================================
# 一句话总结（工程视角）
# ================================================================
# 两个相机光轴基本一致（Z→X），以约 6 cm 的基线在 body 侧向
# 展开，是典型的双目平行配置。
# ================================================================

#Multiple thread support
multiple_thread: 1

#feature traker paprameters
max_cnt: 150            # max feature number in feature tracking
min_dist: 30            # min distance between two features
freq: 10                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image
F_threshold: 1.0        # ransac threshold (pixel)
show_track: 1           # publish tracking image as topic
flow_back: 1            # perform forward and backward optical flow to improve feature tracking accuracy

#optimization parameters
max_solver_time: 0.04  # max solver itration time (ms), to guarantee real time
max_num_iterations: 8   # max solver itrations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)

#imu parameters       The more accurate parameters you provide, the better performance
acc_n: 0.1          # accelerometer measurement noise standard deviation. #0.2   0.04
gyr_n: 0.01         # gyroscope measurement noise standard deviation.     #0.05  0.004
acc_w: 0.001         # accelerometer bias random work noise standard deviation.  #0.002
gyr_w: 0.0001       # gyroscope bias random work noise standard deviation.     #4.0e-5
g_norm: 9.805         # gravity magnitude

#unsynchronization parameters
estimate_td: 1                      # online estimate time offset between camera and imu
td: 0.00                             # initial value of time offset. unit: s. readed image clock + td = real image clock (IMU clock)

#loop closure parameters
load_previous_pose_graph: 0        # load and reuse previous pose graph; load from 'pose_graph_save_path'
pose_graph_save_path: "/home/lyx/output/pose_graph/" # save and load path
save_image: 0                   # save image in pose graph for visualization prupose; you can close this function by setting 0
